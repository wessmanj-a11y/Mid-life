<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MID-LIFE</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 10%,#7c2d1244,transparent 30%),radial-gradient(circle at 85% 5%,#0891b244,transparent 28%),#07070a;color:#f8fafc;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1180px;margin:0 auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:end}.eyebrow{color:#f9a8d4;font-weight:900;letter-spacing:.3em;text-transform:uppercase;font-size:12px}h1{font-size:clamp(56px,10vw,116px);line-height:.85;margin:8px 0 10px;font-weight:1000;letter-spacing:-.08em}.pink{color:#f472b6}.panel{border:1px solid #ffffff22;background:#ffffff0b;border-radius:28px;padding:22px;box-shadow:0 20px 70px #0008}.grid{display:grid;gap:14px}.stats{grid-template-columns:repeat(6,1fr);margin:18px 0}.stat{background:#0009;border:1px solid #ffffff18;border-radius:18px;padding:12px}.stat b{display:block;font-size:12px;text-transform:uppercase;color:#94a3b8}.stat span{font-size:30px;font-weight:1000}.btn{border:0;border-radius:18px;background:#ec4899;color:white;padding:14px 20px;font-weight:1000;text-transform:uppercase;box-shadow:0 12px 34px #ec489955}.btn.alt{background:#22d3ee;color:#061016}.btn.red{background:#ef4444}.btn:disabled{filter:grayscale(1);opacity:.45}.cards{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}.card{border:1px solid #ffffff22;background:linear-gradient(135deg,#111827,#020617);border-radius:26px;padding:16px;color:white;text-align:left;box-shadow:0 18px 45px #0008;transition:.18s;min-height:250px}.card:hover{transform:translateY(-6px);border-color:#f9a8d4}.emoji{height:72px;width:72px;border-radius:18px;display:grid;place-items:center;font-size:44px;background:linear-gradient(135deg,#ec489944,#22d3ee33);margin-bottom:12px}.cost{float:right;background:#fde047;color:#111;padding:5px 10px;border-radius:999px;font-weight:1000}.card h3{font-size:24px;line-height:1;margin:6px 0;text-transform:uppercase}.type{font-size:11px;color:#f9a8d4;font-weight:900;letter-spacing:.22em;text-transform:uppercase}.small{color:#cbd5e1;font-size:14px}.layout{display:grid;grid-template-columns:340px 1fr;gap:18px}.enemy{background:linear-gradient(135deg,#450a0a,#020617)}.bar{height:14px;border-radius:999px;background:#000;overflow:hidden}.bar i{display:block;height:100%;background:#f87171}.relics{display:flex;flex-wrap:wrap;gap:8px}.relic{border:1px solid #fbbf2433;background:#78350f55;border-radius:999px;padding:8px 12px;font-size:13px}footer{margin-top:20px;color:#94a3b8}.hide{display:none}@media(max-width:780px){.stats{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.top{display:block}}
</style>
</head>
<body>
<div class="wrap">
<header class="top"><div><div class="eyebrow">solo deckbuilder prototype</div><h1>MID-<span class="pink">LIFE</span></h1><p class="small">Survive age 40 to 50 without becoming a weird bitter goblin.</p></div><button class="btn red" onclick="newRun()">New Run</button></header>
<div id="app"></div>
<footer>This page is a GitHub Pages-safe playable build. The full React source is still in the repo.</footer>
</div>
<SCRIPT>
const S=['health','relationships','wealth','purpose','sanity','energy'];const icons={health:'❤️',relationships:'🤝',wealth:'💵',purpose:'🧭',sanity:'🧠',energy:'⚡'};
const cards=[['therapy','Therapy','Heal',1,3,{sanity:2},'🛋️','Pay someone to say “that sounds hard.” It works.'],['dog','Dog Walk','Skill',1,2,{health:1,sanity:1},'🐕','The dog has no retirement plan and seems happier.'],['coffee','Coffee','Chaos',0,1,{energy:1,sanity:-1},'☕','A beverage and a legal personality disorder.'],['boundary','Boundary','Skill',1,5,{relationships:1},'🚧','No is a complete sentence. A terrifying one.'],['sheet','Spreadsheet','Action',1,4,{wealth:1},'📊','Conditional formatting is cheaper than control issues.'],['gym','Gym Attempt','Action',2,7,{health:2,sanity:-1},'🏋️','You pulled something getting dressed.'],['friend','Call Friend','Skill',1,3,{relationships:2},'📱','A ten-minute call becomes group therapy.'],['breath','Deep Breath','Skill',0,2,{sanity:1},'🌬️','Inhale. Exhale. Pretend the calendar is not real.'],['buy','Questionable Purchase','Chaos',1,6,{wealth:-2,purpose:1},'🛒','Not a phase. A hobby with tracking numbers.'],['pto','Take PTO','Heal',2,4,{health:2,sanity:2,wealth:-1},'🏖️','Your inbox becomes a crime scene.'],['plan','Emergency Plan','Action',1,5,{purpose:1},'🛰️','A plan for the plan becoming a different plan.']].map(c=>({id:c[0],title:c[1],type:c[2],cost:c[3],dmg:c[4],fx:c[5],emoji:c[6],txt:c[7]}));
const enemies=[['Burnout',18,{health:-2,purpose:-1},'🔥','You have not taken a real day off since flip phones.'],['Regret',16,{sanity:-2},'👻','A ghost made of old texts and better comebacks.'],['Comparison',17,{wealth:-1,sanity:-1},'🕶️','Their highlight reel brought ring lights.'],['Nostalgia',15,{purpose:-2},'📼','Everything was better except the jeans.'],['Perfectionism',20,{sanity:-1,relationships:-1},'📋','A clipboard monster grading your breathing.'],['HOA President',18,{wealth:-2},'🏘️','Your mailbox is insufficiently beige.'],['Mysterious Joint Pain',14,{health:-2},'🦴','No origin story. Just lore.'],['Doomscrolling',16,{sanity:-2,energy:-1},'📵','You checked one notification and civilization ended twice.'],['The CFO',22,{wealth:-1,purpose:-1,sanity:-1},'💼','Wants innovation, but cheaper and yesterday.'],['3AM Overthinking',19,{sanity:-2,health:-1},'🛏️','Why did you say that thing in 2012?']].map(e=>({title:e[0],resolve:e[1],atk:e[2],emoji:e[3],txt:e[4]}));
const bossNames=['The Group Chat','Unexpected Car Repair','Career Reorg','Your Doctor Says “At Your Age”','The Mirror','Teenager Needs Advice','Budget Review','Regret Ghost','Existential Crisis','Acceptance'];
const relics=['Wisdom 🦉','Perspective 🌍','Resilience 🦆','Connection 🤝','Dog 🐶','Air Fryer 🍟','Costco Membership 🛒','Weird Hobby 🎸','Comfortable Shoes 👟','Emergency Fund 💵','Therapy Breakthrough 💡'];
const events=[['Promotion!','🎉',[['Accept with dead eyes',{wealth:3,sanity:-2}],['Negotiate like a grownup',{wealth:2,purpose:1}],['Decline and feel powerful',{sanity:2,wealth:-1}]]],['Daughter Needs Advice','🎓',[['Listen, do not solve',{relationships:3,purpose:1}],['Order pizza',{relationships:2,wealth:-1}],['Panic internally',{sanity:-1,relationships:1}]]],['New Hobby Era','🎸',[['Go all in',{purpose:3,wealth:-3}],['Watch 14 hours of reviews',{sanity:1,energy:-1}],['Be normal for once',{purpose:1}]]],['Annual Physical','🩺',[['Actually change something',{health:3,sanity:1}],['Ignore the portal message',{health:-2,sanity:1}],['Buy comfortable shoes',{health:2,wealth:-1}]]]];
let g;function sh(a){return [...a].sort(()=>Math.random()-.5)}function pick(a){return a[Math.floor(Math.random()*a.length)]}function clamp(){S.forEach(k=>g.stats[k]=Math.max(0,Math.min(k==='energy'?10:25,g.stats[k])))}function fx(o){Object.entries(o||{}).forEach(([k,v])=>g.stats[k]+=v);clamp();if(g.stats.health<=0)over('Your Health hit 0. Your knees filed a formal complaint.');if(g.stats.sanity<=0)over('Your Sanity hit 0. The group chat won.')}function newRun(){g={screen:'start',age:40,enc:0,stats:{health:10,relationships:10,wealth:10,purpose:10,sanity:10,energy:3},deck:sh([...cards.slice(0,8)]),draw:[],discard:[],hand:[],relics:[],msg:'Welcome to your forties. The tutorial is over.'};render()}function statHtml(){return '<div class="grid stats">'+S.map(k=>`<div class="stat"><b>${icons[k]} ${k}</b><span>${g.stats[k]}</span></div>`).join('')+'</div>'}function screen(top){document.getElementById('app').innerHTML=top}function base(){return statHtml()+`<div class="panel"><b>Age ${g.age}</b> · Encounter ${g.enc}/4 · Deck ${g.deck.length} · Relics ${g.relics.length}<br><span class="pink">${g.msg}</span></div><br>`}function chooseClass(t){if(t==='Corporate')fx({wealth:2,sanity:-1});if(t==='Dreamer')fx({purpose:3,wealth:-2});if(t==='Disaster')fx({energy:1,purpose:1});g.screen='map';g.msg=t+' selected. You feel ready, which is adorable.';render()}function begin(){g.enc++;if(g.enc===4){let i=Math.min(g.age-40,bossNames.length-1);g.enemy={title:bossNames[i],resolve:24+i*2,atk:{sanity:-2,purpose:i>4?-1:0},emoji:'👹',txt:'Boss fight. Try not to become a LinkedIn post.'}}else if(Math.random()<.38){g.event=pick(events);g.screen='event';render();return}else g.enemy={...pick(enemies)};g.enemy.hp=g.enemy.resolve;g.draw=sh(g.deck);g.discard=[];draw();g.stats.energy=3;g.screen='combat';g.msg='An enemy appears wearing your insecurities as pants.';render()}function draw(){g.hand=[];while(g.hand.length<5){if(!g.draw.length){g.draw=sh(g.discard);g.discard=[];if(!g.draw.length)break}g.hand.push(g.draw.pop())}}function play(i){let c=g.hand[i];if(g.stats.energy<c.cost)return;g.stats.energy-=c.cost;fx(c.fx);g.enemy.hp=Math.max(0,g.enemy.hp-c.dmg);g.discard.push(c);g.hand.splice(i,1);g.msg=c.title+' dealt '+c.dmg+' resolve damage.';if(g.enemy.hp<=0){g.screen='reward';g.rewards=sh([{kind:'card',v:pick(cards)},{kind:'card',v:pick(cards)},{kind:'relic',v:pick(relics)}]);}render()}function endTurn(){fx(g.enemy.atk);g.discard.push(...g.hand);draw();g.stats.energy=3;g.msg=g.enemy.title+' attacked your life choices.';render()}function reward(i){let r=g.rewards[i];if(r.kind==='card'){g.deck.push(r.v);g.msg='Added '+r.v.title+'.'}else{g.relics.push(r.v);g.msg='Found treasure: '+r.v+'.'}after()}function after(){if(g.enc>=4){if(g.age>=49){over('You reached age 50. Not perfect. Not clean. But yours.',ending());return}g.age++;g.enc=0;fx({sanity:g.relics.some(x=>x.startsWith('Wisdom'))?1:0,purpose:g.relics.some(x=>x.startsWith('Weird'))?1:0});}g.screen='map';render()}function option(i){let ev=g.event;let o=ev[2][i];fx(o[1]);g.msg=o[0];after()}function ending(){let s=g.stats;if(s.health>=14&&s.relationships>=14&&s.purpose>=14)return'Thriving';if(s.relationships>=17)return'Family First';if(s.wealth>=18&&s.sanity<=8)return'Wealthy But Tired';if(s.purpose>=18&&s.wealth<=9)return'Enlightened Weirdo';if(s.health<=7||s.sanity<=7)return'Survivor';return s.health+s.relationships+s.wealth+s.purpose+s.sanity>62?'Mostly Held Together':'Beautiful Disaster'}function over(reason,end){g.screen='over';g.reason=reason;g.end=end;render()}function card(c,i){return `<button class="card" onclick="play(${i})" ${g.stats.energy<c.cost?'disabled':''}><span class="cost">${c.cost} ⚡</span><div class="emoji">${c.emoji}</div><h3>${c.title}</h3><div class="type">${c.type}</div><p>${c.txt}</p><p class="small">Deal ${c.dmg} resolve.</p></button>`}function render(){if(g.screen==='start')return screen(`<section class="panel"><h2>Choose Your Mid-Life Build</h2><div class="grid cards">${['Corporate','Adventurer','Dreamer','Disaster'].map(x=>`<button class="card" onclick="chooseClass('${x}')"><div class="emoji">${x==='Corporate'?'💼':x==='Adventurer'?'🧭':x==='Dreamer'?'🌌':'🛰️'}</div><h3>${x}</h3><p>Start aging with a deeply questionable advantage.</p></button>`).join('')}</div></section>`);if(g.screen==='map')return screen(base()+`<section class="panel"><h2>Year ${g.age} → ${g.age+1}</h2><p>${[1,2,3,4].map(n=>n<=g.enc?'✅':n===4?'👹':'🃏').join(' ')}</p><button class="btn alt" onclick="begin()">Begin Next Encounter</button><h3>Treasures</h3><div class="relics">${g.relics.map(r=>`<span class="relic">${r}</span>`).join('')||'<span class="small">No treasures yet. Just vibes.</span>'}</div></section>`);if(g.screen==='event'){let e=g.event;return screen(base()+`<section class="panel"><div class="emoji">${e[1]}</div><h2>${e[0]}</h2><div class="grid cards">${e[2].map((o,i)=>`<button class="card" onclick="option(${i})"><h3>${o[0]}</h3><p>${Object.entries(o[1]).map(([k,v])=>k+' '+v).join(', ')}</p></button>`).join('')}</div></section>`)}if(g.screen==='combat')return screen(base()+`<section class="layout"><aside class="panel enemy"><div class="emoji">${g.enemy.emoji}</div><h2>${g.enemy.title}</h2><p>${g.enemy.txt}</p><div class="bar"><i style="width:${100*g.enemy.hp/g.enemy.resolve}%"></i></div><p>Resolve ${g.enemy.hp}/${g.enemy.resolve}</p><button class="btn red" onclick="endTurn()">End Turn</button></aside><div class="grid cards">${g.hand.map(card).join('')}</div></section>`);if(g.screen==='reward')return screen(base()+`<section class="panel"><h2>Choose a Reward</h2><div class="grid cards">${g.rewards.map((r,i)=>`<button class="card" onclick="reward(${i})"><div class="emoji">${r.kind==='card'?r.v.emoji:'🏆'}</div><h3>${r.kind==='card'?r.v.title:r.v}</h3><p>${r.kind==='card'?r.v.txt:'A weird treasure for a weird decade.'}</p></button>`).join('')}</div></section>`);if(g.screen==='over')return screen(`<section class="panel" style="text-align:center"><div style="font-size:80px">${g.end?'🏆':'💀'}</div><h2>${g.end||'Mid-Life Crisis'}</h2><p>${g.reason}</p>${statHtml()}<button class="btn" onclick="newRun()">Start New Run</button></section>`)}
newRun();
</SCRIPT>
</body>
</html>
